name: Weekly PharmaPulse feed

# Refreshes docs/feed.json from the configured news source and opens a PR.
# Runs every Monday 13:00 UTC, or on demand via the "Run workflow" button.
#
# Requires repo secret ANTHROPIC_API_KEY and repo variable SOURCE_DOMAIN
# (Settings → Secrets and variables → Actions). Scheduled runs only fire when
# this file is on the DEFAULT branch.

on:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:
    inputs:
      model:
        description: "Claude model to use"
        required: false
        default: "claude-sonnet-4-6"

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-feed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Generate feed
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SOURCE_DOMAIN: ${{ vars.SOURCE_DOMAIN }}
          FEED_MODEL: ${{ github.event.inputs.model || 'claude-sonnet-4-6' }}
        run: python3 pipeline/generate_feed.py

      - name: Rebuild static web preview
        run: python3 pipeline/build_web.py

      - name: Open pull request for review
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(feed): weekly source refresh"
          branch: bot/weekly-feed
          delete-branch: true
          title: "Weekly PharmaPulse feed update"
          body: |
            Automated weekly refresh of `docs/feed.json` from the configured source.

            **Review before merging** (your review gate):
            - [ ] Headlines & impact analysis match the sources
            - [ ] No source-provider name leaked into headlines/details
            - [ ] Categories look right
            - [ ] `weekRange` is correct

            Merging to `main` publishes the rebuilt page to GitHub Pages.
          labels: feed, automated
