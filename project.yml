# XcodeGen spec — only needed if you want to regenerate PharmaPulse.xcodeproj.
# Install:  brew install xcodegen
# Run:      xcodegen generate
# The committed PharmaPulse.xcodeproj already works; this is a convenience fallback.
name: PharmaPulse
options:
  bundleIdPrefix: com.mpchealthcare
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: PharmaPulse
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  PharmaPulse:
    type: application
    platform: iOS
    sources:
      - PharmaPulse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mpchealthcare.pharmapulse
