<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>PharmaPulse</title>
<meta name="theme-color" content="#1E3A8A" />
<!-- Add-to-Home-Screen niceties for iPhone -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<style>
  :root{
    --accent:#1E3A8A; --accent2:#2563EB;
    --bg:#f2f3f7; --card:#ffffff; --text:#0f172a; --muted:#64748b; --line:#e5e7eb;
    --cat-approval:#16A34A; --cat-regulatory:#2563EB; --cat-phase3:#7C3AED;
    --cat-biosimilar:#0D9488; --cat-crl:#DC2626; --cat-deals:#EA580C;
    --cat-outlook:#4F46E5; --cat-eu:#0891B2; --cat-default:#64748b;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#0b1020; --card:#151b2e; --text:#e7ebf3; --muted:#94a3b8; --line:#26304a; }
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    background:var(--bg); color:var(--text); line-height:1.45;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .wrap{ max-width:720px; margin:0 auto; padding:0 14px 40px; }

  /* Header / KPI card */
  header.hero{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff; border-radius:0 0 22px 22px; padding:calc(16px + env(safe-area-inset-top)) 18px 20px;
  }
  .hero .wrap{ padding:0; }
  .brandrow{ display:flex; align-items:center; gap:8px; font-weight:600; font-size:.92rem; opacity:.95; }
  .kpi{ display:flex; align-items:baseline; gap:8px; margin-top:8px; }
  .kpi b{ font-size:2.6rem; font-weight:800; letter-spacing:-1px; }
  .kpi span{ font-weight:600; opacity:.92; }
  .meta{ margin-top:6px; font-size:.82rem; opacity:.9; display:flex; gap:14px; flex-wrap:wrap; }

  /* Controls */
  .controls{ position:sticky; top:0; z-index:5; background:var(--bg);
             padding:12px 0 6px; }
  .search{ display:flex; align-items:center; gap:8px; background:var(--card);
           border:1px solid var(--line); border-radius:12px; padding:10px 12px; }
  .search input{ border:0; outline:0; background:transparent; color:var(--text);
                 font-size:1rem; width:100%; }
  .chips{ display:flex; gap:8px; overflow-x:auto; padding:10px 0 4px; scrollbar-width:none; }
  .chips::-webkit-scrollbar{ display:none; }
  .chip{ flex:0 0 auto; border:0; cursor:pointer; font-size:.82rem; font-weight:600;
         padding:7px 13px; border-radius:999px; display:inline-flex; align-items:center; gap:6px;
         color:var(--c); background:color-mix(in srgb,var(--c) 13%, transparent); white-space:nowrap; }
  .chip[aria-pressed="true"]{ color:#fff; background:var(--c); }

  /* Feed */
  .banner{ font-size:.82rem; color:var(--muted); background:var(--card);
           border:1px solid var(--line); border-radius:12px; padding:10px 12px; margin:4px 0 10px; }
  .card{ position:relative; background:var(--card); border:1px solid var(--line);
         border-radius:14px; padding:14px 14px 14px 18px; margin-bottom:12px; cursor:pointer;
         overflow:hidden; transition:transform .08s ease; }
  .card:active{ transform:scale(.99); }
  .card::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:5px; background:var(--c); }
  .pill{ display:inline-flex; align-items:center; gap:5px; font-size:.72rem; font-weight:700;
         color:var(--c); background:color-mix(in srgb,var(--c) 13%, transparent);
         padding:3px 9px; border-radius:999px; }
  .toprow{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .date{ font-size:.74rem; color:var(--muted); }
  .card h2{ font-size:1.05rem; margin:8px 0 6px; line-height:1.3; }
  .card p{ margin:0; color:var(--muted); font-size:.92rem;
           display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .empty{ text-align:center; color:var(--muted); padding:50px 10px; }

  /* Detail overlay */
  .sheet{ position:fixed; inset:0; z-index:20; background:var(--bg);
          transform:translateX(100%); transition:transform .25s ease; overflow-y:auto;
          padding-bottom:40px; }
  .sheet.open{ transform:translateX(0); }
  .sheetbar{ position:sticky; top:0; background:color-mix(in srgb,var(--bg) 88%, transparent);
             backdrop-filter:saturate(180%) blur(12px); padding:calc(10px + env(safe-area-inset-top)) 14px 10px;
             display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--line); }
  .back{ border:0; background:transparent; color:var(--accent2); font-size:1rem; font-weight:600;
         cursor:pointer; display:inline-flex; align-items:center; gap:4px; }
  .sheetbar .cat{ font-weight:600; font-size:.95rem; color:var(--muted); }
  .detail{ max-width:720px; margin:0 auto; padding:16px 16px; }
  .detail h1{ font-size:1.4rem; line-height:1.3; margin:12px 0; }
  .section{ background:var(--card); border:1px solid var(--line); border-radius:14px;
            padding:14px; margin:14px 0; }
  .section .lbl{ font-weight:700; font-size:.82rem; margin-bottom:6px; color:var(--c); display:flex; gap:6px; }
  .section p{ margin:0; font-size:.95rem; }
  .cta{ display:block; text-align:center; text-decoration:none; color:#fff; background:var(--c);
        font-weight:700; padding:14px; border-radius:12px; margin-top:8px; }
  .fineprint{ text-align:center; color:var(--muted); font-size:.74rem; margin-top:8px; }
  .ico{ width:1em; height:1em; display:inline-block; vertical-align:-2px; }
</style>
</head>

    document.getElementById("week").innerHTML = feed.weekRange ? "📅 "+esc(feed.weekRange) : "";
    const upd = feed.generatedAt ? new Date(feed.generatedAt) : null;
    document.getElementById("updated").textContent = upd && !isNaN(upd) ? "Updated "+upd.toLocaleDateString(undefined,{month:"short",day:"numeric"}) : "";
    document.getElementById("banner").innerHTML = fromLive ? "" :
      '<div class="banner">Showing bundled stories — enable GitHub Pages to fetch the live feed.</div>';
    renderChips(); renderFeed();
  }

  function renderChips(){
    const present = [...new Set(ALL.map(a=>a.catClass))];
    const el = document.getElementById("chips");
    const chip = (key,label,on) => {
      const c = cat(key).c;
      return `<button class="chip" data-cat="${key==null?'':esc(key)}" aria-pressed="${on}" style="--c:${c}">`+
             (key?ico(cat(key).icon):"")+esc(label)+`</button>`;
    };
    el.innerHTML = chip(null,"All",state.cat===null) + present.map(k=>chip(k,cat(k).name,state.cat===k)).join("");
    el.querySelectorAll(".chip").forEach(b=>b.onclick=()=>{
      const k=b.dataset.cat||null; state.cat=(state.cat===k)?null:(k||null); if(b.dataset.cat==="")state.cat=null;
      renderChips(); renderFeed();
    });
  }

  function renderFeed(){
    const q=state.q.toLowerCase();
    const list=ALL.filter(a=>{
      const okCat = !state.cat || a.catClass===state.cat;
      const okQ = !q || (a.headline+a.drugs+a.category).toLowerCase().includes(q);
      return okCat && okQ;
    });
    const feed=document.getElementById("feed");
    if(!list.length){ feed.innerHTML='<div class="empty">No stories match. Try another category or search.</div>'; return; }
    feed.innerHTML=list.map((a,i)=>{
      const c=cat(a.catClass);
      return `<div class="card" style="--c:${c.c}" data-id="${a.id}">
        <div class="toprow"><span class="pill">${ico(c.icon)}${esc(a.category)}</span><span class="date">${fmtDate(a.date)}</span></div>
        <h2>${esc(a.headline)}</h2><p>${esc(a.details)}</p></div>`;
    }).join("");
    feed.querySelectorAll(".card").forEach(card=>card.onclick=()=>openDetail(+card.dataset.id));
  }

  function openDetail(id){
    const a=ALL.find(x=>x.id===id); if(!a) return;
    const c=cat(a.catClass);
    document.getElementById("sheetcat").textContent=a.category;
    document.getElementById("detail").innerHTML=`
      <span class="pill" style="--c:${c.c}">${ico(c.icon)}${esc(a.category)}</span>
      <h1>${esc(a.headline)}</h1>
      ${a.date?`<div class="date">📅 ${fmtLong(a.date)}</div>`:""}
      <p style="margin:12px 0;font-size:1rem">${esc(a.details)}</p>
      <div class="section" style="--c:${c.c}"><div class="lbl">💊 Drugs &amp; Markets Affected</div><p>${esc(a.drugs)}</p></div>
      <div class="section" style="--c:${c.c}"><div class="lbl">📊 Industry Impact Analysis</div><p>${esc(a.impact)}</p></div>
      ${a.url?`<a class="cta" style="--c:${c.c}" href="${esc(a.url)}" target="_blank" rel="noopener">Read on Citeline Insights ↗</a>
      <div class="fineprint">Full article may require a Citeline subscription.</div>`:""}`;
    document.getElementById("detail").scrollTop=0;
    const s=document.getElementById("sheet"); s.classList.add("open"); s.setAttribute("aria-hidden","false");
    history.pushState({detail:true},"");
  }
  function closeDetail(){
    const s=document.getElementById("sheet"); s.classList.remove("open"); s.setAttribute("aria-hidden","true");
  }
  document.getElementById("back").onclick=()=>{ if(history.state&&history.state.detail) history.back(); else closeDetail(); };
  window.addEventListener("popstate",closeDetail);
  document.getElementById("q").addEventListener("input",e=>{ state.q=e.target.value; renderFeed(); });

  // 1) paint embedded immediately, 2) try live feed.json (wins if reachable)
  apply(loadEmbedded(), false);
  fetch("feed.json",{cache:"no-store"}).then(r=>r.ok?r.json():Promise.reject()).then(f=>apply(f,true)).catch(()=>{});
})();
</script>
</body>
</html>
